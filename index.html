<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FOODIES 2.0 — Leave a Review</title>

  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════
       GRAFFITI BACKGROUND (always visible)
    ═══════════════════════════════════════ */
    #bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: #e8213a;
      overflow: hidden;
    }

    /* Halftone dots */
    #bg::after {
      content: '';
      position: absolute; inset: 0; z-index: 2;
      background-image: radial-gradient(circle, rgba(0,0,0,0.2) 1.5px, transparent 1.5px);
      background-size: 13px 13px;
      pointer-events: none;
    }

    /* Corner panels */
    .panel { position: absolute; z-index: 1; }
    .panel::after {
      content: ''; position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,0.13) 1.5px, transparent 1.5px);
      background-size: 11px 11px;
    }
    .p-tl {
      top: 0; left: 0; width: 48%; height: 50%;
      background: #f5c518;
      clip-path: polygon(0 0, 100% 0, 0 100%);
    }
    .p-tr {
      top: 0; right: 0; width: 48%; height: 50%;
      background: #4a8fd4;
      clip-path: polygon(0 0, 100% 0, 100% 100%);
    }
    .p-bl {
      bottom: 0; left: 0; width: 50%; height: 44%;
      background: #2fa84f;
      clip-path: polygon(0 0, 55% 100%, 0 100%);
    }
    .p-br {
      bottom: 0; right: 0; width: 52%; height: 44%;
      background: #f5a623;
      clip-path: polygon(100% 0, 100% 100%, 30% 100%);
    }

    /* Clouds */
    .cloud-row {
      position: absolute; left: 0; right: 0; z-index: 5;
      display: flex; justify-content: space-evenly;
    }
    .cloud-row.top    { top: -16px; }
    .cloud-row.bottom { bottom: -16px; }

    .cloud {
      position: relative; flex-shrink: 0;
      width: 88px; height: 34px;
      background: #f0ede0;
      border-radius: 50px;
      border: 3.5px solid #111;
    }
    .cloud::before {
      content: ''; position: absolute;
      top: -20px; left: 10px;
      width: 38px; height: 38px;
      background: #f0ede0; border-radius: 50%;
      border: 3.5px solid #111;
    }
    .cloud::after {
      content: ''; position: absolute;
      top: -28px; left: 30px;
      width: 48px; height: 48px;
      background: #f0ede0; border-radius: 50%;
      border: 3.5px solid #111;
    }
    .cloud.sm { width: 66px; transform: scale(0.82); transform-origin: bottom center; }
    .cloud.lg { width: 104px; }

    /* Lightning bolts */
    .bolt { position: absolute; z-index: 7; filter: drop-shadow(2px 3px 0 #111) drop-shadow(-1px -1px 0 #111); }
    .bolt svg { display: block; }

    /* Stars */
    .bg-star {
      position: absolute; z-index: 7;
      font-size: 26px; color: transparent;
      -webkit-text-stroke: 3px #111;
      user-select: none;
    }

    /* SV tag */
    .tag-sv {
      position: absolute; z-index: 7;
      left: 4%; top: 34%;
      font-family: 'Bangers', cursive;
      font-size: clamp(28px, 5vw, 54px);
      letter-spacing: 4px;
      color: #4ac8e8;
      -webkit-text-stroke: 3px #111;
      text-shadow: 4px 4px 0 #111;
      transform: rotate(-4deg);
    }

    /* ART tag */
    .tag-art {
      position: absolute; z-index: 7;
      right: 5%; bottom: 11%;
      font-family: 'Bangers', cursive;
      font-size: clamp(24px, 4.5vw, 50px);
      letter-spacing: 3px;
      color: #d4f028;
      -webkit-text-stroke: 3px #111;
      text-shadow: 4px 5px 0 #111, 0 6px 0 rgba(0,0,0,0.4);
      transform: rotate(3deg);
    }

    /* GRAFFITI 2.0 — top banner, above the form */
    .bg-graffiti {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 42%;
      z-index: 6;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; user-select: none;
    }
    .g-row { display: flex; align-items: flex-end; gap: 12px; }
    .g-word {
      font-family: 'Bangers', cursive;
      font-size: clamp(48px, 9.5vw, 96px);
      letter-spacing: 6px; line-height: 0.9;
      color: #fff;
      -webkit-text-stroke: 5px #111;
      text-shadow:
        7px 7px 0 #111, -3px -3px 0 #111,
        3px -3px 0 #111, -3px 3px 0 #111,
        10px 12px 0 rgba(0,0,0,0.4);
    }
    .g-v2 {
      font-family: 'Bangers', cursive;
      font-size: clamp(26px, 4.8vw, 50px);
      letter-spacing: 3px;
      color: #f5c518;
      -webkit-text-stroke: 3px #111;
      text-shadow:
        4px 4px 0 #111, -2px -2px 0 #111,
        2px -2px 0 #111, -2px 2px 0 #111,
        6px 6px 0 rgba(0,0,0,0.4);
      margin-bottom: 4px;
    }

    /* ═══════════════════════════════════════
       PAGES — always sit above the background
    ═══════════════════════════════════════ */
    .page { display: none; }

    /* Review page: form in lower area, shifted up a bit */
    #page-review.active {
      display: flex;
      position: relative; z-index: 10;
      min-height: 100vh;
      align-items: flex-end;
      justify-content: center;
      padding: 0 16px 120px;
    }

    /* Admin pages: solid white bg covers the graffiti */
    #page-login.active,
    #page-admin.active {
      display: block;
      position: relative; z-index: 10;
      min-height: 100vh;
      background: #fafafa;
      padding: 32px 16px;
    }
    .admin-inner { max-width: 480px; margin: 0 auto; }

    /* ── FORM CARD — frosted glass ── */
    .form-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 3px solid rgba(255,255,255,0.9);
      box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      padding: 22px 22px 18px;
    }

    .form-header { text-align: center; margin-bottom: 14px; }
    .subtitle {
      color: #555; font-size: 11px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
    }

    .form-group { margin-bottom: 12px; }
    input, textarea {
      width: 100%; padding: 11px 13px;
      border: 2px solid #ddd; border-radius: 10px;
      font-size: 14px; font-family: inherit;
      outline: none; background: #fff; color: #222;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #e8213a; }
    textarea { height: 80px; resize: none; }

    .btn {
      display: block; width: 100%; padding: 12px;
      border: 2.5px solid #111; border-radius: 10px;
      font-size: 15px; font-weight: 800; cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 4px 4px 0 #111; letter-spacing: 1px;
    }
    .btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #111; }
    .btn-primary { background: #e8213a; color: #fff; }
    .btn-dark    { background: #222; color: #fff; }
    .btn-danger  {
      background: #e74c3c; color: #fff;
      padding: 5px 11px; width: auto;
      font-size: 12px; font-weight: 700;
      border-radius: 6px; border: 2px solid #111;
      box-shadow: 2px 2px 0 #111; cursor: pointer;
    }
    .btn-danger:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 #111; }

    .stars { display: flex; justify-content: center; gap: 6px; margin: 4px 0 12px; }
    .star {
      font-size: 32px; cursor: pointer; color: #ddd;
      -webkit-text-stroke: 1px #bbb;
      transition: color 0.15s, transform 0.1s; user-select: none;
    }
    .star.filled { color: #f5a623; -webkit-text-stroke: 1px #b8740a; }
    .star:hover  { transform: scale(1.2); }

    .msg { padding: 10px 13px; border-radius: 8px; font-size: 13px; margin-top: 10px; display: none; font-weight: 600; }
    .msg.show { display: block; }
    .msg-success { background: #fef6e4; color: #b8740a; border: 2px solid #f5d99a; }
    .msg-error   { background: #fdecea; color: #c0392b; border: 2px solid #f5c6c3; }

    .admin-link {
      display: block; text-align: center;
      margin-top: 14px; font-size: 12px;
      color: rgba(255,255,255,0.7); text-decoration: none;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }
    .admin-link:hover { color: #fff; }

    /* Admin page elements */
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .admin-header h2 { font-size: 20px; font-weight: 800; }
    .review-count { color: #888; font-size: 13px; margin-bottom: 14px; }

    .review-card {
      border: 1.5px solid #eee; border-radius: 10px;
      padding: 14px; margin-bottom: 10px;
      background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .review-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .review-name  { font-weight: 700; font-size: 14px; }
    .review-stars { color: #f5a623; font-size: 15px; margin: 2px 0 5px; }
    .review-text  { color: #444; font-size: 13px; line-height: 1.5; }
    .review-time  { color: #bbb; font-size: 11px; margin-top: 5px; }
    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 600px) {
      /* Lock entire page to viewport — no scrolling */
      html, body { height: 100%; overflow: hidden; }

      /* Shrink graffiti banner */
      .bg-graffiti { height: 30%; }
      .g-word {
        font-size: 12vw;
        -webkit-text-stroke: 3px #111;
        text-shadow: 4px 4px 0 #111, -2px -2px 0 #111, 2px -2px 0 #111, -2px 2px 0 #111, 6px 7px 0 rgba(0,0,0,0.4);
      }
      .g-v2 { font-size: 5.5vw; -webkit-text-stroke: 2px #111; }

      /* Form centered in lower 70%, with room for ART tag below */
      #page-review.active {
        height: 100vh;
        overflow: hidden;
        align-items: flex-end;
        padding: 0 12px 80px;
      }

      /* Compact card so it fits and ART is visible below */
      .form-card { padding: 14px 14px 10px; border-radius: 16px; }
      .form-header { margin-bottom: 8px; }
      .form-group { margin-bottom: 8px; }
      input, textarea { padding: 9px 12px; font-size: 14px; }
      textarea { height: 62px; }
      .stars { margin: 2px 0 8px; }
      .star { font-size: 28px; }
      .btn { padding: 11px; font-size: 14px; }
      .admin-link { margin-top: 8px; }

      /* Move ART tag up so it shows above the form card */
      .tag-art { bottom: 19%; right: 3%; font-size: 6vw; }
      .tag-sv  { top: 32%; left: 3%; font-size: 7vw; }

      /* Smaller clouds */
      .cloud    { width: 68px; height: 26px; }
      .cloud.lg { width: 82px; }
      .cloud.sm { width: 50px; }
      .cloud::before { width: 28px; height: 28px; top: -14px; left: 8px; }
      .cloud::after  { width: 36px; height: 36px; top: -20px; left: 22px; }
    }
  </style>
</head>
<body>

  <!-- ══ GRAFFITI BACKGROUND (always visible) ══ -->
  <div id="bg" aria-hidden="true">
    <div class="panel p-tl"></div>
    <div class="panel p-tr"></div>
    <div class="panel p-bl"></div>
    <div class="panel p-br"></div>

    <div class="cloud-row top">
      <div class="cloud sm"></div><div class="cloud"></div>
      <div class="cloud lg"></div><div class="cloud"></div>
      <div class="cloud lg"></div><div class="cloud sm"></div>
      <div class="cloud"></div><div class="cloud sm"></div>
    </div>
    <div class="cloud-row bottom">
      <div class="cloud lg"></div><div class="cloud sm"></div>
      <div class="cloud"></div><div class="cloud lg"></div>
      <div class="cloud sm"></div><div class="cloud"></div>
      <div class="cloud lg"></div><div class="cloud sm"></div>
    </div>

    <!-- Lightning bolt top-right -->
    <div class="bolt" style="top:6%;right:17%;width:54px;height:74px;">
      <svg viewBox="0 0 56 76" width="54" height="74">
        <defs>
          <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffe566"/>
            <stop offset="100%" stop-color="#e8900a"/>
          </linearGradient>
        </defs>
        <polygon points="34,0 56,0 22,40 46,40 0,76 14,40 0,40" fill="#111"/>
        <polygon points="32,2 54,2 20,40 44,40 2,74 12,40 2,40" fill="url(#bg1)"/>
      </svg>
    </div>

    <!-- Lightning bolt bottom-left -->
    <div class="bolt" style="bottom:14%;left:31%;width:44px;height:60px;transform:rotate(12deg);">
      <svg viewBox="0 0 56 76" width="44" height="60">
        <defs>
          <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ffe566"/>
            <stop offset="100%" stop-color="#e8900a"/>
          </linearGradient>
        </defs>
        <polygon points="34,0 56,0 22,40 46,40 0,76 14,40 0,40" fill="#111"/>
        <polygon points="32,2 54,2 20,40 44,40 2,74 12,40 2,40" fill="url(#bg2)"/>
      </svg>
    </div>

    <div class="bg-star" style="top:40%;left:17%;">✦</div>
    <div class="bg-star" style="bottom:28%;right:22%;font-size:18px;">✦</div>

    <div class="tag-sv">SV</div>
    <div class="tag-art">ART</div>

    <div class="bg-graffiti">
      <div class="g-row">
        <span class="g-word">GRAFFITI</span>
        <span class="g-v2">2.0</span>
      </div>
    </div>
  </div>

  <!-- ══ PAGE: Review Form ══ -->
  <section id="page-review" class="page">
    <div class="form-card">
      <div class="form-header">
        <p class="subtitle">⭐ College Fest · Leave a Review ⭐</p>
      </div>

      <div class="form-group">
        <input id="input-name" type="text" placeholder="Your Name" maxlength="60" />
      </div>

      <div class="stars" id="stars">
        <span class="star" data-value="1">★</span>
        <span class="star" data-value="2">★</span>
        <span class="star" data-value="3">★</span>
        <span class="star" data-value="4">★</span>
        <span class="star" data-value="5">★</span>
      </div>

      <div class="form-group">
        <textarea id="input-review" placeholder="Write your review..." maxlength="500"></textarea>
      </div>

      <button class="btn btn-primary" id="btn-submit">Submit Review</button>

      <div id="msg-submit-success" class="msg msg-success">✅ Thank you! Your review was submitted.</div>
      <div id="msg-submit-error"   class="msg msg-error">⚠️ Fill in all fields and pick a star rating.</div>
      <div id="msg-submit-fail"    class="msg msg-error">❌ Submission failed. Check your connection.</div>

      <a href="#" class="admin-link" id="link-admin">Admin →</a>
    </div>
  </section>

  <!-- ══ PAGE: Admin Login ══ -->
  <section id="page-login" class="page">
    <div class="admin-inner">
      <div style="text-align:center;margin-bottom:28px;margin-top:20px;">
        <div style="font-size:36px;">🔒</div>
        <h1 style="font-size:22px;font-weight:800;margin-top:8px;">Admin Login</h1>
      </div>
      <div class="form-group">
        <input id="input-password" type="password" placeholder="Password" />
      </div>
      <button class="btn btn-dark" id="btn-login">Login</button>
      <div id="msg-login-error" class="msg msg-error">Incorrect password.</div>
      <a href="#" class="admin-link" id="link-back-review" style="margin-top:16px;">← Back to review</a>
    </div>
  </section>

  <!-- ══ PAGE: Admin Dashboard ══ -->
  <section id="page-admin" class="page">
    <div class="admin-inner">
      <div class="admin-header">
        <h2>📋 Reviews</h2>
        <button class="btn-danger" id="btn-logout">Logout</button>
      </div>
      <p class="review-count" id="review-count">Loading...</p>
      <div id="reviews-list"></div>
    </div>
  </section>

  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyBrUJuNl2zoGjr8UzzMHDPS121apPzc08g",
      authDomain:        "college-fest-stall.firebaseapp.com",
      projectId:         "college-fest-stall",
      storageBucket:     "college-fest-stall.firebasestorage.app",
      messagingSenderId: "696660328478",
      appId:             "1:696660328478:web:91bc121bd835f107a9ee0f"
    };

    const ADMIN_PASSWORD = "ram123";

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ── PAGE ROUTING ──────────────────────────────────────────────────────────
    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // ── STAR RATING ───────────────────────────────────────────────────────────
    let selectedRating = 0;
    const stars = document.querySelectorAll('.star');

    stars.forEach(star => {
      star.addEventListener('mouseover', () => highlightStars(+star.dataset.value));
      star.addEventListener('mouseout',  () => highlightStars(selectedRating));
      star.addEventListener('click',     () => { selectedRating = +star.dataset.value; highlightStars(selectedRating); });
    });

    function highlightStars(n) {
      stars.forEach(s => s.classList.toggle('filled', +s.dataset.value <= n));
    }

    // ── SUBMIT REVIEW ─────────────────────────────────────────────────────────
    document.getElementById('btn-submit').addEventListener('click', async () => {
      hideAllMsgs();
      const name   = document.getElementById('input-name').value.trim();
      const text   = document.getElementById('input-review').value.trim();
      const rating = selectedRating;

      if (!name || !text || rating < 1) { show('msg-submit-error'); return; }

      try {
        await db.collection('reviews').add({
          name, rating, text,
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        document.getElementById('input-name').value   = '';
        document.getElementById('input-review').value = '';
        selectedRating = 0;
        highlightStars(0);
        show('msg-submit-success');
      } catch (err) {
        console.error(err);
        show('msg-submit-fail');
      }
    });

    // ── ADMIN LOGIN ───────────────────────────────────────────────────────────
    document.getElementById('link-admin').addEventListener('click', e => {
      e.preventDefault();
      if (sessionStorage.getItem('admin') === '1') {
        loadAdminDashboard(); showPage('page-admin');
      } else {
        showPage('page-login');
      }
    });

    document.getElementById('link-back-review').addEventListener('click', e => {
      e.preventDefault(); hideAllMsgs(); showPage('page-review');
    });

    document.getElementById('btn-login').addEventListener('click', () => {
      hideAllMsgs();
      const pw = document.getElementById('input-password').value;
      if (pw === ADMIN_PASSWORD) {
        sessionStorage.setItem('admin', '1');
        document.getElementById('input-password').value = '';
        loadAdminDashboard(); showPage('page-admin');
      } else {
        show('msg-login-error');
      }
    });

    document.getElementById('input-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });

    // ── ADMIN DASHBOARD ───────────────────────────────────────────────────────
    function loadAdminDashboard() {
      const list  = document.getElementById('reviews-list');
      const count = document.getElementById('review-count');
      list.innerHTML = '<p style="color:#bbb;font-size:14px;">Loading...</p>';
      count.textContent = '';

      db.collection('reviews').orderBy('timestamp', 'desc').get()
        .then(snapshot => {
          count.textContent = snapshot.size + ' review' + (snapshot.size !== 1 ? 's' : '');
          if (snapshot.empty) {
            list.innerHTML = '<p style="color:#bbb;font-size:14px;">No reviews yet.</p>';
            return;
          }
          list.innerHTML = '';
          snapshot.forEach(doc => list.appendChild(buildReviewCard(doc.id, doc.data())));
        })
        .catch(err => {
          console.error(err);
          list.innerHTML = '<p style="color:#e74c3c;font-size:14px;">Failed to load reviews.</p>';
        });
    }

    function buildReviewCard(id, data) {
      const card = document.createElement('div');
      card.className = 'review-card';
      card.id = 'card-' + id;
      const safeRating = Math.min(5, Math.max(0, Math.round(data.rating) || 0));
      const starStr = '★'.repeat(safeRating) + '☆'.repeat(5 - safeRating);
      const timeStr = data.timestamp ? formatTime(data.timestamp.toDate()) : '—';
      card.innerHTML = `
        <div class="review-card-header">
          <span class="review-name">${escapeHtml(String(data.name || ''))}</span>
          <button class="btn-danger" data-id="${id}">Delete</button>
        </div>
        <div class="review-stars">${starStr}</div>
        <div class="review-text">${escapeHtml(String(data.text || ''))}</div>
        <div class="review-time">${timeStr}</div>
      `;
      card.querySelector('.btn-danger').addEventListener('click', () => deleteReview(id));
      return card;
    }

    function deleteReview(id) {
      db.collection('reviews').doc(id).delete().then(() => {
        const card = document.getElementById('card-' + id);
        if (card) card.remove();
        const n = document.querySelectorAll('.review-card').length;
        document.getElementById('review-count').textContent = n + ' review' + (n !== 1 ? 's' : '');
      }).catch(err => console.error('Delete failed:', err));
    }

    // ── LOGOUT ────────────────────────────────────────────────────────────────
    document.getElementById('btn-logout').addEventListener('click', () => {
      sessionStorage.removeItem('admin'); showPage('page-review');
    });

    // ── HELPERS ───────────────────────────────────────────────────────────────
    function show(id) { document.getElementById(id).classList.add('show'); }
    function hideAllMsgs() { document.querySelectorAll('.msg').forEach(m => m.classList.remove('show')); }
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function formatTime(date) {
      const now = new Date();
      const time = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      if (date.toDateString() === now.toDateString()) return 'Today ' + time;
      return date.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ', ' + time;
    }

    // ── INIT ──────────────────────────────────────────────────────────────────
    showPage('page-review');
  </script>
</body>
